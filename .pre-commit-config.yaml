repos:
  - repo: https://github.com/gitguardian/ggshield
    rev: v1.31.0
    hooks:
      - id: ggshield
        language_version: python3
        stages: [ commit ]
  - repo: https://github.com/crate-ci/typos
    rev: v1.26.0
    hooks:
      - id: typos

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.0.0
    hooks:
      - id: flake8

  - repo: local
    hooks:
      - id: forbid-cell-dir-check
        name: forbid cell_dir wildcard check
        # Match any quoted literal (single or double quotes) used in the pattern
        # e.g. if 'py-149_500-error' not in cell_dir: or if "foo" not in cell_dir:
        entry: "^\\s*if\\s+(['\"]).+?\\1\\s+not\\s+in\\s+cell_dir:"
        language: pygrep
        types: [python]
        files: app/tests/*.py