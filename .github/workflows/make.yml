name: make
on:
  release:
    types: [ published ]
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  schedule:
    - cron: '0 4 5,25 * *'

jobs:
  configure-workflow:
    name: Configure workflow
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        name: Configure skip-duplicate-actions
        uses: fkirc/skip-duplicate-actions@v5
        with:
          paths_ignore: '["**/README.md"]'  # FIXME
          do_not_skip: '["workflow_dispatch", "schedule", "release" ,"push"]'

  lint:
    uses: ./.github/workflows/lint.yml
    needs: [ configure-workflow ]
    if: ${{ needs.configure-workflow.outputs.should_skip != 'true' }}
    with:
      runs-on: ubuntu-latest

  call-collect-tests:
    uses: ./.github/workflows/collect-tests.yml


  split-tests:
    needs: [ call-collect-tests ]
    runs-on: ubuntu-latest
    outputs:
      test_list: ${{ steps.split-output.outputs.test_list }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download pytest output artifact
        uses: actions/download-artifact@v8
        with:
          name: test_list
          path: ./

      - name: Generate matrix from pytest_output
        id: split-output
        run: |
          cat test_list.json
          # Merge test parameters, to run them sequentially within a runner
          MATRIX=$(jq -c '. | map(.module + "::" + .test) | unique' test_list.json)
          echo $MATRIX
          echo "test_list=$MATRIX" >> $GITHUB_OUTPUT

  call-pytest:
    uses: ./.github/workflows/run-tests.yml
    needs: [ configure-workflow, split-tests ]
    if: ${{ needs.configure-workflow.outputs.should_skip != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.split-tests.outputs.test_list) }}
    with:
      runs-on: ubuntu-latest
      debug: ${{ vars.DEBUG }}
      verify_ssl: ${{ vars.VERIFY_SSL }}
      disable_auth: ${{ vars.DISABLE_AUTH }}
      test: ${{ matrix.test }}
    secrets:
      cell_github_token: ${{ secrets.CELL_GITHUB_TOKEN }}
      registry_token_for_tests: ${{ secrets.REGISTRY_TOKEN_FOR_TESTS }}

  set-version:
    needs: [ call-pytest ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Commit version
        id: set-version
        run: |
          # Extract tag version (strip refs/tags/ prefix)
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          # Update the version in app/__init__.py which defines __version__() -> return 'vX.Y.Z'
          # This replaces the return line with the new version string from the tag.
          sed -i "s/\(return \).*/\1'${VERSION}'/" app/__init__.py

          # Commit and push the change back to the branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/__init__.py || true
          git commit -m "Set version to ${VERSION} in app/__init__.py [skip ci]" || echo "No changes to commit"
          if [ -n "${GITHUB_REF}" ] && [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            BRANCH=${GITHUB_REF#refs/heads/}
            git push origin HEAD:refs/heads/${BRANCH}
          else
            # fallback
            git push || true
          fi          

  call-build-container:
    needs: [ set-version ]
    uses: ./.github/workflows/build-container.yml
    with:
      oci_tag: ghcr.io/naavre/naavre-containerizer-service
      version: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
      push: ${{ github.event_name == 'release' }}

  call-helm-chart-release:
    needs: [ call-build-container ]
    uses: ./.github/workflows/helm-chart-release.yml
    with:
      oci_repo: ghcr.io/naavre/charts
      version: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
      push: ${{ github.event_name == 'release' }}